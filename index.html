<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scratchy</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111;
      overflow: hidden;
    }

    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    #app {
      width: 100%;
      height: 100vh;
      position: relative;
      background: #111;
      color: #eee;
    }

    #editor {
      box-sizing: border-box;
      width: 100%;
      height: 100vh;
      padding: 24px;
      border: none;
      outline: none;
      overflow-y: auto;

      background: #111;
      color: #eee;

      font-family: inherit;
      font-size: 18px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;

      transition: transform 0.18s ease, opacity 0.18s ease;
      touch-action: pan-y;
    }

    #editor:empty::before {
      content: attr(data-placeholder);
      color: #555;
      pointer-events: none;
    }

    #editor.flip-next {
      transform: translateX(-45px);
      opacity: 0.45;
    }

    #editor.flip-prev {
      transform: translateX(45px);
      opacity: 0.45;
    }

    #editor a {
      color: #4ea1ff;
      text-decoration: underline;
      cursor: pointer;
    }

    #pageIndicator {
      position: fixed;
      right: 12px;
      bottom: 10px;
      padding: 4px 8px;
      border: 1px solid #333;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.55);
      color: #777;
      font-size: 12px;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="editor" contenteditable="true" data-placeholder="Start typing..."></div>
    <div id="pageIndicator">page 1 / 1</div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://bycoavnmcjdvicjhatly.supabase.co";
    const SUPABASE_KEY = "sb_publishable_tg_ndX5hPkpLv64Mub1iOg_3N8bmsRk";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const editor = document.getElementById("editor");
    const pageIndicator = document.getElementById("pageIndicator");

    let pages = [""];
    let currentPage = 0;
    let saveTimer = null;
    let lastSavedContent = "";

    let startX = 0;
    let startY = 0;
    let isDragging = false;

    function encodePages() {
      return JSON.stringify({
        type: "scratchy-pages",
        version: 1,
        pages
      });
    }

    function decodePages(content) {
      if (!content) return [""];

      try {
        const parsed = JSON.parse(content);

        if (
          parsed &&
          parsed.type === "scratchy-pages" &&
          Array.isArray(parsed.pages)
        ) {
          return parsed.pages.length ? parsed.pages : [""];
        }
      } catch (e) {
        // Old version: plain text note.
      }

      return [content];
    }

    function escapeHTML(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function linkify(text) {
      const safe = escapeHTML(text);

      return safe.replace(
        /(https?:\/\/[^\s<]+|www\.[^\s<]+)/g,
        function (url) {
          const href = url.startsWith("http") ? url : "https://" + url;
          return `<a href="${href}" target="_blank" rel="noopener noreferrer">${url}</a>`;
        }
      );
    }

    function updatePageIndicator() {
      pageIndicator.textContent = `page ${currentPage + 1} / ${pages.length}`;
    }

    function renderPage() {
      editor.innerHTML = linkify(pages[currentPage] || "");
      updatePageIndicator();

      // Put cursor at the end after changing pages.
      editor.focus();

      const range = document.createRange();
      const selection = window.getSelection();
      range.selectNodeContents(editor);
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function saveCurrentPageLocally() {
      pages[currentPage] = editor.innerText;
    }

    async function loadNote() {
      const { data, error } = await supabase
        .from("notes")
        .select("content")
        .eq("id", "main")
        .single();

      if (error) {
        console.error("Load error:", error);
        editor.setAttribute("data-placeholder", "Error loading note. Check Supabase.");
        return;
      }

      pages = decodePages(data?.content || "");

      // Begin at last page.
      currentPage = pages.length - 1;

      lastSavedContent = encodePages();
      renderPage();
    }

    async function saveNote() {
      saveCurrentPageLocally();

      const content = encodePages();

      if (content === lastSavedContent) return;

      const { error } = await supabase
        .from("notes")
        .update({
          content: content,
          updated_at: new Date().toISOString()
        })
        .eq("id", "main");

      if (error) {
        console.error("Save error:", error);
        return;
      }

      lastSavedContent = content;
    }

    function scheduleSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveNote, 700);
    }

    function goNextPage() {
      saveCurrentPageLocally();

      editor.classList.add("flip-next");

      setTimeout(function () {
        if (currentPage < pages.length - 1) {
          currentPage++;
        } else {
          pages.push("");
          currentPage = pages.length - 1;
        }

        renderPage();
        editor.classList.remove("flip-next");
        scheduleSave();
      }, 160);
    }

    function goPreviousPage() {
      if (currentPage === 0) return;

      saveCurrentPageLocally();

      editor.classList.add("flip-prev");

      setTimeout(function () {
        currentPage--;
        renderPage();
        editor.classList.remove("flip-prev");
        scheduleSave();
      }, 160);
    }

    editor.addEventListener("input", function () {
      saveCurrentPageLocally();
      scheduleSave();
    });

    editor.addEventListener("click", function (e) {
      if (e.target.tagName === "A") {
        e.preventDefault();
        window.open(e.target.href, "_blank");
      }
    });

    editor.addEventListener("pointerdown", function (e) {
      startX = e.clientX;
      startY = e.clientY;
      isDragging = true;
    });

    editor.addEventListener("pointerup", function (e) {
      if (!isDragging) return;

      const diffX = e.clientX - startX;
      const diffY = e.clientY - startY;

      isDragging = false;

      // Ignore tiny movements and mostly vertical scrolling.
      if (Math.abs(diffX) < 80 || Math.abs(diffY) > Math.abs(diffX)) return;

      if (diffX < 0) {
        // Drag left = next page.
        goNextPage();
      } else {
        // Drag right = previous page.
        goPreviousPage();
      }
    });

    window.addEventListener("beforeunload", saveNote);

    loadNote();
  </script>
</body>
</html>
