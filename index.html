<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scratchy</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111;
      overflow: hidden;
    }

    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    #app {
      width: 100%;
      height: 100vh;
      position: relative;
      background: #111;
      color: #eee;
    }

    #editor {
      box-sizing: border-box;
      width: 100%;
      height: 100vh;
      padding: 24px;
      border: none;
      outline: none;
      overflow-y: auto;

      background: #111;
      color: #eee;

      font-family: inherit;
      font-size: 18px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;

      transition: transform 0.22s ease, opacity 0.22s ease;
      touch-action: pan-y;
    }

    #editor:empty::before {
      content: attr(data-placeholder);
      color: #555;
      pointer-events: none;
    }

    #editor.flip-next {
      transform: translateX(-55px);
      opacity: 0.45;
    }

    #editor.flip-prev {
      transform: translateX(55px);
      opacity: 0.45;
    }

    #editor a {
      color: #4ea1ff;
      text-decoration: underline;
      cursor: pointer;
    }

    #editor .scratchy-strike {
      color: #777;
      text-decoration: line-through;
      text-decoration-thickness: 2px;
    }

    #editor img.pasted-image {
      max-width: min(100%, 360px);
      max-height: 260px;
      height: auto;
      display: block;
      margin: 12px 0;
      border-radius: 6px;
      object-fit: contain;
    }

    #pageIndicator {
      position: fixed;
      right: 12px;
      bottom: 10px;
      padding: 4px 8px;
      border: 1px solid #333;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.55);
      color: #777;
      font-size: 12px;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="editor" contenteditable="true" data-placeholder="Start typing..."></div>
    <div id="pageIndicator">page 1 / 1</div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://bycoavnmcjdvicjhatly.supabase.co";
    const SUPABASE_KEY = "sb_publishable_tg_ndX5hPkpLv64Mub1iOg_3N8bmsRk";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const editor = document.getElementById("editor");
    const pageIndicator = document.getElementById("pageIndicator");

    let pages = [""];
    let currentPage = 0;

    let saveTimer = null;
    let lastSavedContent = "";

    let startX = 0;
    let startY = 0;
    let startEdge = null;
    let isDragging = false;

    // Page flip settings.
    // Lower EDGE_SIZE = harder to accidentally trigger.
    // Higher FLIP_DISTANCE = longer swipe needed.
    const EDGE_SIZE = 28;
    const FLIP_DISTANCE = 170;

    function encodePages() {
      return JSON.stringify({
        type: "scratchy-pages-html",
        version: 4,
        pages: pages
      });
    }

    function decodePages(content) {
      if (!content) return [""];

      try {
        const parsed = JSON.parse(content);

        if (
          parsed &&
          Array.isArray(parsed.pages) &&
          (
            parsed.type === "scratchy-pages-html" ||
            parsed.type === "scratchy-pages"
          )
        ) {
          return parsed.pages.length ? parsed.pages : [""];
        }
      } catch (e) {
        // Old plain-text note.
      }

      return [escapeHTML(content)];
    }

    function escapeHTML(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function updatePageIndicator() {
      pageIndicator.textContent = `page ${currentPage + 1} / ${pages.length}`;
    }

    function saveCurrentPageLocally() {
      pages[currentPage] = editor.innerHTML;
    }

    function renderPage() {
      editor.innerHTML = pages[currentPage] || "";
      removeOldStrikeFormatting();
      makeLinksClickable();
      applyStrikeFormatting();
      saveCurrentPageLocally();
      updatePageIndicator();
      editor.focus();
      moveCursorToEnd();
    }

    function moveCursorToEnd() {
      const range = document.createRange();
      const selection = window.getSelection();

      range.selectNodeContents(editor);
      range.collapse(false);

      selection.removeAllRanges();
      selection.addRange(range);
    }

    function removeOldStrikeFormatting() {
      editor.querySelectorAll(".scratchy-strike, s").forEach((el) => {
        el.replaceWith(document.createTextNode(el.textContent));
      });

      editor.normalize();
    }

    function makeLinksClickable() {
      const walker = document.createTreeWalker(
        editor,
        NodeFilter.SHOW_TEXT,
        {
          acceptNode(node) {
            if (
              node.parentElement &&
              node.parentElement.closest("a, script, style")
            ) {
              return NodeFilter.FILTER_REJECT;
            }

            if (/(https?:\/\/[^\s<]+|www\.[^\s<]+)/.test(node.nodeValue)) {
              return NodeFilter.FILTER_ACCEPT;
            }

            return NodeFilter.FILTER_REJECT;
          }
        }
      );

      const nodes = [];

      while (walker.nextNode()) {
        nodes.push(walker.currentNode);
      }

      nodes.forEach((textNode) => {
        const text = textNode.nodeValue;
        const fragment = document.createDocumentFragment();

        const regex = /(https?:\/\/[^\s<]+|www\.[^\s<]+)/g;
        let lastIndex = 0;
        let match;

        while ((match = regex.exec(text)) !== null) {
          const before = text.slice(lastIndex, match.index);
          if (before) fragment.appendChild(document.createTextNode(before));

          const url = match[0];
          const href = url.startsWith("http") ? url : "https://" + url;

          const a = document.createElement("a");
          a.href = href;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.textContent = url;

          fragment.appendChild(a);
          lastIndex = match.index + url.length;
        }

        const after = text.slice(lastIndex);
        if (after) fragment.appendChild(document.createTextNode(after));

        textNode.replaceWith(fragment);
      });
    }

    function applyStrikeFormatting() {
      const walker = document.createTreeWalker(
        editor,
        NodeFilter.SHOW_TEXT,
        {
          acceptNode(node) {
            if (
              node.parentElement &&
              node.parentElement.closest("a, script, style")
            ) {
              return NodeFilter.FILTER_REJECT;
            }

            if (/[^.!?\n]+!!!/g.test(node.nodeValue)) {
              return NodeFilter.FILTER_ACCEPT;
            }

            return NodeFilter.FILTER_REJECT;
          }
        }
      );

      const nodes = [];

      while (walker.nextNode()) {
        nodes.push(walker.currentNode);
      }

      nodes.forEach((textNode) => {
        const text = textNode.nodeValue;
        const fragment = document.createDocumentFragment();

        const regex = /([^.!?\n]+!!!)/g;
        let lastIndex = 0;
        let match;

        while ((match = regex.exec(text)) !== null) {
          const before = text.slice(lastIndex, match.index);
          if (before) fragment.appendChild(document.createTextNode(before));

          const span = document.createElement("span");
          span.className = "scratchy-strike";
          span.textContent = match[0];

          fragment.appendChild(span);
          lastIndex = match.index + match[0].length;
        }

        const after = text.slice(lastIndex);
        if (after) fragment.appendChild(document.createTextNode(after));

        textNode.replaceWith(fragment);
      });
    }

    function applySmartFormatting() {
      removeOldStrikeFormatting();
      makeLinksClickable();
      applyStrikeFormatting();
      saveCurrentPageLocally();
    }

    async function reduceImage(file, maxWidth = 700, maxHeight = 700, quality = 0.65) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const reader = new FileReader();

        reader.onload = function () {
          img.src = reader.result;
        };

        reader.onerror = reject;

        img.onload = function () {
          let width = img.width;
          let height = img.height;

          const ratio = Math.min(maxWidth / width, maxHeight / height, 1);

          width = Math.round(width * ratio);
          height = Math.round(height * ratio);

          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;

          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);

          const reducedDataUrl = canvas.toDataURL("image/jpeg", quality);

          resolve(reducedDataUrl);
        };

        img.onerror = reject;

        reader.readAsDataURL(file);
      });
    }

    function insertNodeAtCursor(node) {
      const selection = window.getSelection();

      if (!selection || !selection.rangeCount) {
        editor.appendChild(node);
        return;
      }

      const range = selection.getRangeAt(0);
      range.deleteContents();
      range.insertNode(node);

      range.setStartAfter(node);
      range.setEndAfter(node);

      selection.removeAllRanges();
      selection.addRange(range);
    }

    async function loadNote() {
      const { data, error } = await supabase
        .from("notes")
        .select("content")
        .eq("id", "main")
        .single();

      if (error) {
        console.error("Load error:", error);
        editor.setAttribute("data-placeholder", "Error loading note. Check Supabase.");
        return;
      }

      pages = decodePages(data?.content || "");

      // Begin at last page.
      currentPage = pages.length - 1;

      renderPage();
      lastSavedContent = encodePages();
    }

    async function saveNote() {
      saveCurrentPageLocally();

      const content = encodePages();

      if (content === lastSavedContent) return;

      const { error } = await supabase
        .from("notes")
        .update({
          content: content,
          updated_at: new Date().toISOString()
        })
        .eq("id", "main");

      if (error) {
        console.error("Save error:", error);
        return;
      }

      lastSavedContent = content;
    }

    function scheduleSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveNote, 700);
    }

    function goNextPage() {
      applySmartFormatting();

      editor.classList.add("flip-next");

      setTimeout(function () {
        if (currentPage < pages.length - 1) {
          currentPage++;
        } else {
          pages.push("");
          currentPage = pages.length - 1;
        }

        renderPage();
        editor.classList.remove("flip-next");
        scheduleSave();
      }, 190);
    }

    function goPreviousPage() {
      if (currentPage === 0) return;

      applySmartFormatting();

      editor.classList.add("flip-prev");

      setTimeout(function () {
        currentPage--;
        renderPage();
        editor.classList.remove("flip-prev");
        scheduleSave();
      }, 190);
    }

    editor.addEventListener("input", function () {
      // Do NOT auto-format while typing.
      // This prevents the bug where everything keeps being crossed out.
      saveCurrentPageLocally();
      scheduleSave();
    });

    editor.addEventListener("blur", function () {
      // Format only when leaving the editor.
      // Removing !!! will also remove the strikeout next time this runs.
      applySmartFormatting();
      scheduleSave();
    });

    editor.addEventListener("click", function (e) {
      if (e.target.tagName === "A") {
        e.preventDefault();
        window.open(e.target.href, "_blank");
      }
    });

    editor.addEventListener("paste", async function (e) {
      const items = e.clipboardData?.items;
      if (!items) return;

      for (const item of items) {
        if (item.type.startsWith("image/")) {
          e.preventDefault();

          const file = item.getAsFile();
          if (!file) return;

          const reducedImage = await reduceImage(file, 700, 700, 0.65);

          const img = document.createElement("img");
          img.className = "pasted-image";
          img.src = reducedImage;
          img.alt = "Pasted image";

          insertNodeAtCursor(img);
          insertNodeAtCursor(document.createElement("br"));

          saveCurrentPageLocally();
          scheduleSave();

          return;
        }
      }
    });

    editor.addEventListener("pointerdown", function (e) {
      const selection = window.getSelection();

      // Do not start page flipping while text is selected.
      if (selection && !selection.isCollapsed) {
        isDragging = false;
        startEdge = null;
        return;
      }

      startX = e.clientX;
      startY = e.clientY;
      startEdge = null;
      isDragging = true;

      if (startX <= EDGE_SIZE) {
        startEdge = "left";
      } else if (window.innerWidth - startX <= EDGE_SIZE) {
        startEdge = "right";
      }
    });

    editor.addEventListener("pointerup", function (e) {
      if (!isDragging || !startEdge) {
        isDragging = false;
        startEdge = null;
        return;
      }

      const selection = window.getSelection();

      // If the drag created text selection, do not flip.
      if (selection && !selection.isCollapsed) {
        isDragging = false;
        startEdge = null;
        return;
      }

      const diffX = e.clientX - startX;
      const diffY = e.clientY - startY;

      isDragging = false;

      // Needs to be a deliberate horizontal swipe.
      if (Math.abs(diffX) < FLIP_DISTANCE) {
        startEdge = null;
        return;
      }

      // Ignore diagonal/vertical movement.
      if (Math.abs(diffY) > Math.abs(diffX) * 0.45) {
        startEdge = null;
        return;
      }

      // From right edge, swipe left = next page.
      if (startEdge === "right" && diffX < 0) {
        goNextPage();
      }

      // From left edge, swipe right = previous page.
      if (startEdge === "left" && diffX > 0) {
        goPreviousPage();
      }

      startEdge = null;
    });

    window.addEventListener("beforeunload", saveNote);

    loadNote();
  </script>
</body>
</html>
