<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const SUPABASE_URL = "https://bycoavnmcjdvicjhatly.supabase.co";
  const SUPABASE_KEY = "sb_publishable_tg_ndX5hPkpLv64Mub1iOg_3N8bmsRk";

  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  const editor = document.getElementById("editor");

  let saveTimer = null;
  let lastSavedContent = "";

  async function loadNote() {
    const { data, error } = await supabase
      .from("notes")
      .select("content")
      .eq("id", "main")
      .single();

    if (error) {
      console.error("Load error:", error);
      editor.placeholder = "Error loading note. Check Supabase table/policies.";
      return;
    }

    editor.value = data?.content || "";
    lastSavedContent = editor.value;
  }

  async function saveNote() {
    const content = editor.value;

    if (content === lastSavedContent) return;

    const { error } = await supabase
      .from("notes")
      .update({
        content,
        updated_at: new Date().toISOString()
      })
      .eq("id", "main");

    if (error) {
      console.error("Save error:", error);
      return;
    }

    lastSavedContent = content;
  }

  editor.addEventListener("input", () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveNote, 700);
  });

  window.addEventListener("beforeunload", () => {
    saveNote();
  });

  loadNote();
</script>
